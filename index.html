<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin | Pura Vida Wellness</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Admin">
    <meta name="application-name" content="Admin">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a3a24">

    <meta property="og:title" content="Administración | Pura Vida Wellness">
    <meta property="og:description" content="Panel de control de citas, agenda e historial clínico de Tica Nature Spa.">
    <meta property="og:image" content="logo.png">
    <meta property="og:type" content="website">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Lato', sans-serif; background-color: #f8f9fa; color: #333; -webkit-tap-highlight-color: transparent; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        
        .calendar-container { background: white; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); overflow: hidden; }
        .calendar-header { background: #1a3a24; color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; padding: 10px; }
        .day-name { font-size: 10px; font-weight: bold; color: #999; padding-bottom: 10px; text-transform: uppercase; }
        
        .day-cell { 
            padding: 15px 5px; font-size: 14px; position: relative; cursor: pointer; 
            border-radius: 15px; transition: 0.2s; border: 1px solid transparent; 
            overflow: hidden; isolation: isolate; 
        }
        .day-cell:hover { background: #f0fdf4; }
        .day-cell.today { border: 2px solid #1a3a24; color: #1a3a24; font-weight: bold; }
        .day-cell.selected { background: #1a3a24 !important; color: white !important; }
        .day-cell.not-current { color: #ccc; }
        
        .day-fill { position: absolute; bottom: 0; left: 0; width: 100%; background-color: #d1fae5; z-index: -1; transition: height 0.5s ease; }
        .day-cell.selected .day-fill { display: none; }

        .dot-container { display: flex; justify-content: center; gap: 2px; position: absolute; bottom: 5px; left: 0; right: 0; }
        .dot { width: 4px; height: 4px; border-radius: 50%; }
        .dot-green { background: #10b981; } 
        .dot-red { background: #ef4444; }   

        .slot-admin { transition: all 0.2s; cursor: pointer; border: 2px solid #d1d5db; text-align: center; }
        .slot-admin.blocked-manual { background-color: #fee2e2; color: #b91c1c; border-color: #f87171; } /* Bloqueo manual: rojo claro */
        .slot-admin.booked { background-color: #ef4444; color: white; border-color: #b91c1c; cursor: not-allowed; } /* Cita ocupada: rojo sólido */
        
        /* Modals con prefijos para Safari */
        .modal-admin { display: none; position: fixed; z-index: 500; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
        .modal-content-admin { background: white; margin: 5% auto; padding: 30px; border-radius: 40px; width: 95%; max-width: 500px; max-height: 90vh; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        
        .session-item { border-left: 3px solid #1a3a24; padding-left: 15px; margin-bottom: 15px; background: #f9f9f9; padding: 15px; border-radius: 0 15px 15px 0; }
        
        .marca-punto {
            position: absolute; width: 12px; height: 12px; background-color: rgba(239, 68, 68, 0.8); 
            border: 2px solid #991b1b; border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        /* Glassmorphism robusto para iOS */
        .glass-panel {
            background-color: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>

    <div id="loginOverlay" class="fixed inset-0 z-[600] flex items-center justify-center p-6 bg-cover bg-center bg-no-repeat" style="background-image: url('fondo.jpg');">
        <div class="absolute inset-0 bg-black/40"></div>
        <div class="glass-panel relative p-10 rounded-[40px] shadow-2xl max-w-sm w-full text-center">
            <img src="logo.png" alt="Pura Vida Wellness" class="w-32 h-auto mx-auto mb-6 drop-shadow-lg object-contain" onerror="this.outerHTML='<div class=\\'w-20 h-20 bg-emerald-50/80 rounded-full flex items-center justify-center mx-auto mb-6 text-emerald-800 text-3xl\\'><i class=\\'fas fa-leaf\\'></i></div>'">
            <h2 class="text-2xl mb-6 font-bold text-white drop-shadow-md tracking-widest uppercase">Pura Vida Wellness</h2>
            <input type="password" id="pinInput" placeholder="PIN DE SEGURIDAD" class="w-full p-5 bg-white/70 border border-white/50 rounded-2xl mb-6 text-center text-base md:text-2xl font-black tracking-[0.3em] text-stone-800 outline-none focus:bg-white/95 focus:border-emerald-500 transition-all shadow-inner">
            <button onclick="checkLogin()" class="w-full py-5 bg-[#1a3a24]/90 hover:bg-[#1a3a24] text-white rounded-2xl font-black tracking-widest uppercase text-sm shadow-lg backdrop-blur-sm transition-all active:scale-95 border border-emerald-900/50">
                Entrar al Sistema
            </button>
            <p id="loginError" class="text-red-300 mt-4 hidden font-bold bg-red-900/60 p-2 rounded-xl backdrop-blur-md">PIN INCORRECTO</p>
        </div>
    </div>

    <div id="modalTratamiento" class="modal-admin" onclick="if(event.target==this) cerrarModalTratamiento()">
        <div class="modal-content-admin shadow-2xl bg-stone-50">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-[#1a3a24] uppercase tracking-widest">Ficha de Sesión</h3>
                <button onclick="cerrarModalTratamiento()" class="text-stone-400 hover:text-red-500"><i class="fas fa-times text-xl"></i></button>
            </div>
            <p id="infoPacienteTratamiento" class="text-xs font-black text-emerald-700 uppercase mb-6 bg-emerald-100 p-3 rounded-xl text-center"></p>

            <div class="space-y-6">
                <div>
                    <div class="flex justify-between items-end mb-2">
                        <label class="text-[10px] font-black uppercase text-stone-500 tracking-widest">Mapeo Corporal</label>
                        <button onclick="limpiarMarcas()" class="text-[9px] text-red-500 font-bold uppercase hover:underline"><i class="fas fa-eraser"></i> Borrar Marcas</button>
                    </div>
                    <div class="relative w-full border-2 border-stone-200 rounded-2xl overflow-hidden bg-white shadow-inner cursor-crosshair" style="touch-action: manipulation;" id="contenedorMapaCuerpo" onclick="agregarMarca(event)">
                        <img src="15037.jpg" alt="Mapa Corporal" class="w-full h-auto pointer-events-none" id="imgMapaCuerpo">
                        <div id="capaMarcas" class="absolute inset-0 pointer-events-none"></div>
                    </div>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-black uppercase text-stone-500 tracking-widest">Síntomas Subjetivos / Objetivos</label>
                        <textarea id="txtSintomas" rows="2" class="w-full p-4 bg-white rounded-xl border-2 border-stone-100 font-bold text-base text-stone-700 outline-none focus:border-emerald-500 shadow-sm" placeholder="Inicio / Ubicación / Intensidad / Frecuencia..."></textarea>
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase text-stone-500 tracking-widest">Plan de Tratamiento</label>
                        <textarea id="txtPlan" rows="2" class="w-full p-4 bg-white rounded-xl border-2 border-stone-100 font-bold text-base text-stone-700 outline-none focus:border-emerald-500 shadow-sm" placeholder="Futuros tratamientos / frecuencia / autocuidado..."></textarea>
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase text-stone-500 tracking-widest">Notas Adicionales</label>
                        <textarea id="txtNotas" rows="2" class="w-full p-4 bg-white rounded-xl border-2 border-stone-100 font-bold text-base text-stone-700 outline-none focus:border-emerald-500 shadow-sm" placeholder="Detalles de la sesión..."></textarea>
                    </div>
                </div>

                <div class="pt-4">
                    <button onclick="guardarTratamiento()" class="w-full py-5 bg-[#1a3a24] text-white rounded-[20px] font-black uppercase text-xs shadow-lg active:scale-95 transition-all flex justify-center items-center gap-2">
                        <i class="fas fa-save"></i> Guardar Ficha Clínica
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="modalHistorial" class="modal-admin" onclick="if(event.target==this) cerrarModal()">
        <div class="modal-content-admin shadow-2xl">
            <div id="contenidoHistorial"></div>
            <button onclick="cerrarModal()" class="w-full mt-8 py-4 bg-stone-800 text-white rounded-2xl font-bold uppercase tracking-widest text-xs">Cerrar</button>
        </div>
    </div>

    <div id="modalReagendar" class="modal-admin" onclick="if(event.target==this) cerrarModalReagendar()">
        <div class="modal-content-admin shadow-2xl">
            <h3 class="text-xl font-bold text-[#1a3a24] mb-2 uppercase tracking-widest">Gestión de Cita</h3>
            <p id="infoReagendar" class="text-xs text-stone-500 mb-6 font-bold uppercase"></p>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold uppercase text-stone-400">1. Acción / Motivo:</label>
                    <select id="motivoCambio" onchange="toggleReagendarCampos()" class="w-full p-4 bg-white rounded-xl border-2 border-stone-100 font-bold text-base text-stone-700 outline-none focus:border-emerald-500">
                        <option value="cliente">Reagendar: Clienta lo solicitó</option>
                        <option value="admin">Reagendar: Tráfico / Logística</option>
                        <option value="emergencia">Reagendar: Fuerza mayor</option>
                        <option value="cancelacion">Cancelar: Cliente canceló la cita</option>
                    </select>
                </div>
                
                <div id="camposReagendar" class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold uppercase text-stone-400">2. Nueva Fecha ofrecida:</label>
                        <input type="date" id="newDateInput" onchange="loadFreeSlotsForReschedule()" class="w-full p-4 bg-white rounded-xl border-2 border-stone-100 font-bold text-base outline-none focus:border-emerald-500">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold uppercase text-stone-400">3. Nuevo Horario ofrecido:</label>
                        <select id="newTimeSelect" class="w-full p-4 bg-white rounded-xl border-2 border-stone-100 font-bold text-base text-stone-700 outline-none focus:border-emerald-500">
                            <option value="">Selecciona fecha primero...</option>
                        </select>
                    </div>
                </div>

                <div class="pt-4">
                    <button id="btnConfirmarModal" onclick="confirmarReagendar()" class="w-full py-5 bg-emerald-700 text-white rounded-[25px] font-black uppercase text-xs shadow-lg active:scale-95 transition">Confirmar y Enviar Solución</button>
                    <button onclick="cerrarModalReagendar()" class="w-full py-4 text-stone-400 font-bold uppercase text-[10px] mt-2">Cerrar / Salir</button>
                </div>
            </div>
        </div>
    </div>

    <div id="adminContent" class="hidden min-h-screen pb-20">
        <header class="bg-[#1a3a24] p-8 text-white text-center rounded-b-[40px] shadow-lg">
            <h1 class="text-2xl font-black uppercase tracking-[0.3em]">ADMINISTRACIÓN</h1>
            <p class="text-[9px] text-emerald-300 font-black uppercase mt-2 tracking-[0.2em]">Pura Vida Wellness • Tica Nature Spa</p>
        </header>

        <main class="container mx-auto px-4 mt-8 max-w-4xl space-y-6">
            <div class="calendar-container">
                <div class="calendar-header">
                    <button onclick="changeMonth(-1)" class="p-2"><i class="fas fa-chevron-left"></i></button>
                    <h2 id="calendarTitle" class="text-lg font-bold uppercase tracking-widest">Cargando...</h2>
                    <button onclick="changeMonth(1)" class="p-2"><i class="fas fa-chevron-right"></i></button>
                </div>
                <div class="calendar-grid bg-stone-50 border-b">
                    <div class="day-name">Dom</div><div class="day-name">Lun</div><div class="day-name">Mar</div><div class="day-name">Mié</div><div class="day-name">Jue</div><div class="day-name">Vie</div><div class="day-name">Sáb</div>
                </div>
                <div id="calendarDays" class="calendar-grid py-4"></div>
            </div>

            <div id="dayDetailSection" class="space-y-6">
                <div class="flex items-center gap-4">
                    <div class="h-[2px] bg-stone-200 flex-grow"></div>
                    <h2 id="selectedDateDisplay" class="text-sm font-black text-stone-400 uppercase tracking-[0.2em]">Día no seleccionado</h2>
                    <div class="h-[2px] bg-stone-200 flex-grow"></div>
                </div>
                <div id="listaCitasDia" class="space-y-4"></div>
                
                <div id="gestionAgenda" class="bg-white p-8 rounded-[40px] shadow-sm hidden border border-stone-100">
                    <h3 class="text-center text-xs font-bold uppercase tracking-widest text-stone-400 mb-6">Gestión de Horarios</h3>
                    <div class="grid grid-cols-2 gap-4 mb-8">
                        <button onclick="bloquearDiaCompleto()" class="bg-red-50 text-red-600 border border-red-100 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-red-100 transition">Bloquear Todo el Día</button>
                        <button onclick="liberarDiaCompleto()" class="bg-emerald-50 text-emerald-700 border border-emerald-100 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-emerald-100 transition">Liberar Todo el Día</button>
                    </div>
                    <div class="grid grid-cols-3 gap-3" id="gridAdminSlots"></div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, getDoc, setDoc, deleteDoc, writeBatch, updateDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDf8V0EkG8kQWAKvbc9uekqXYaRtzr8elc",
            authDomain: "tica-natural-spa.firebaseapp.com",
            projectId: "tica-natural-spa",
            storageBucket: "tica-natural-spa.firebasestorage.app",
            messagingSenderId: "441291257817",
            appId: "1:441291257817:web:9b37ee0a611c9ef649cbc8"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // HORARIOS ACTUALIZADOS (De 8 AM a 6 PM, cada hora)
        const slots = ["08:00 AM", "09:00 AM", "10:00 AM", "11:00 AM", "12:00 PM", "01:00 PM", "02:00 PM", "03:00 PM", "04:00 PM", "05:00 PM", "06:00 PM"];

        let todasLasCitas = [];
        let bloqueosManuales = [];
        let currentMonth = new Date().getMonth();
        let currentYear = new Date().getFullYear();
        let selectedDate = null;
        let citaAEditar = null;
        
        let citaTratamientoActual = null;
        let marcasCorporales = [];

        window.checkLogin = () => {
            if(document.getElementById('pinInput').value === "1282") { 
                document.getElementById('loginOverlay').classList.add('hidden');
                document.getElementById('adminContent').classList.remove('hidden');
                iniciarApp();
            } else { 
                document.getElementById('loginError').classList.remove('hidden'); 
            }
        };

        function iniciarApp() {
            onSnapshot(collection(db, 'bookings'), (snap) => {
                todasLasCitas = snap.docs.map(d => ({id: d.id, ...d.data()}));
                renderCalendar();
                if(selectedDate) updateDayDetail();
            });
            onSnapshot(collection(db, 'blocks'), (snap) => {
                bloqueosManuales = snap.docs.map(d => ({id: d.id, ...d.data()}));
                renderCalendar();
                if(selectedDate) updateDayDetail();
            });
        }

        window.changeMonth = (dir) => {
            currentMonth += dir;
            if(currentMonth < 0) { currentMonth = 11; currentYear--; }
            if(currentMonth > 11) { currentMonth = 0; currentYear++; }
            renderCalendar();
        };

        function renderCalendar() {
            const title = document.getElementById('calendarTitle');
            const grid = document.getElementById('calendarDays');
            const meses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
            title.innerText = `${meses[currentMonth]} ${currentYear}`;
            grid.innerHTML = "";
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const prevDaysInMonth = new Date(currentYear, currentMonth, 0).getDate();
            
            for(let x = firstDay; x > 0; x--) {
                const d = prevDaysInMonth - x + 1;
                grid.innerHTML += `<div class="day-cell not-current">${d}</div>`;
            }
            
            const today = new Date();
            
            for(let i = 1; i <= daysInMonth; i++) {
                const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                const citasDelDia = todasLasCitas.filter(c => c.fecha === dateStr);
                const bloquesDelDia = bloqueosManuales.filter(b => b.fecha === dateStr);
                
                const slotsOcupados = new Set([...citasDelDia.map(c => c.hora), ...bloquesDelDia.map(b => b.hora)]).size;
                const porcentajeLleno = (slotsOcupados / slots.length) * 100;

                const isToday = today.getDate() === i && today.getMonth() === currentMonth && today.getFullYear() === currentYear;
                const isSelected = selectedDate === dateStr;
                
                let dots = "";
                if(citasDelDia.length > 0) dots += `<span class="dot dot-green"></span>`;
                if(bloquesDelDia.length > 0) dots += `<span class="dot dot-red"></span>`;
                
                grid.innerHTML += `
                    <div onclick="selectDay('${dateStr}')" class="day-cell ${isToday ? 'today' : ''} ${isSelected ? 'selected' : ''}">
                        <div class="day-fill" style="height: ${porcentajeLleno}%;"></div>
                        ${i}
                        <div class="dot-container">${dots}</div>
                    </div>`;
            }
        }

        window.selectDay = (date) => { selectedDate = date; renderCalendar(); updateDayDetail(); };

        function updateDayDetail() {
            const lista = document.getElementById('listaCitasDia');
            document.getElementById('selectedDateDisplay').innerText = selectedDate;
            document.getElementById('gestionAgenda').classList.remove('hidden');
            const citas = todasLasCitas.filter(c => c.fecha === selectedDate).sort((a,b) => a.hora.localeCompare(b.hora));
            
            if(citas.length === 0) {
                lista.innerHTML = "<p class='text-center py-4 text-stone-400 text-xs italic uppercase'>No hay citas agendadas</p>";
            } else {
                lista.innerHTML = citas.map(c => {
                    const tieneFicha = (c.marcasCuerpo && c.marcasCuerpo.length > 0) || c.notasSintomas || c.notasPlan;
                    const colorFicha = tieneFicha ? 'text-emerald-600 bg-emerald-100' : 'text-stone-400 bg-stone-100';

                    return `
                    <div class="bg-white p-6 rounded-[30px] shadow-sm border-l-8 border-emerald-800 flex justify-between items-center transition hover:shadow-md">
                        <div onclick="verHistorial('${c.telefono}')" class="cursor-pointer flex-grow">
                            <span class="bg-red-500 text-white text-[10px] font-black px-3 py-1.5 rounded-full uppercase shadow-sm">${c.hora}</span>
                            <h4 class="font-black text-lg mt-2 text-stone-800">${c.nombre}</h4>
                            <p class="text-xs font-bold text-stone-400 uppercase tracking-widest mt-1 truncate">${c.tipo || 'Terapia'}</p>
                        </div>
                        <div class="flex gap-2 flex-col sm:flex-row">
                            <button onclick="abrirFichaTratamiento('${c.id}')" class="w-12 h-12 rounded-[18px] flex items-center justify-center text-lg shadow-sm transition active:scale-90 ${colorFicha}" title="Ficha de Sesión">
                                <i class="fas fa-file-medical"></i>
                            </button>
                            <button onclick="abrirModalReagendar('${c.id}')" class="w-12 h-12 bg-blue-50 text-blue-600 rounded-[18px] flex items-center justify-center text-lg shadow-sm transition active:scale-90" title="Reagendar">
                                <i class="fas fa-calendar-alt"></i>
                            </button>
                            <a href="https://wa.me/${c.telefono.replace(/\D/g,'')}" target="_blank" class="w-12 h-12 bg-[#25D366]/10 text-[#25D366] rounded-[18px] flex items-center justify-center text-xl shadow-sm transition active:scale-90" title="Contactar">
                                <i class="fab fa-whatsapp"></i>
                            </a>
                        </div>
                    </div>`
                }).join('');
            }
            
            const bloqueados = bloqueosManuales.filter(b => b.fecha === selectedDate).map(b => b.hora);
            const ocupados = citas.map(c => c.hora);
            document.getElementById('gridAdminSlots').innerHTML = slots.map(time => {
                let status = ""; let classExtra = "";
                if(ocupados.includes(time)) { status = "booked"; classExtra = "booked"; }
                else if(bloqueados.includes(time)) { status = "blocked-manual"; classExtra = "blocked-manual"; }
                return `<div onclick="toggleBloqueo('${time}', '${status}')" class="slot-admin p-4 rounded-[20px] text-[10px] font-black uppercase shadow-sm ${classExtra}">${time}</div>`;
            }).join('');
        }

        window.abrirFichaTratamiento = (id) => {
            citaTratamientoActual = todasLasCitas.find(c => c.id === id);
            document.getElementById('infoPacienteTratamiento').innerText = `Ficha: ${citaTratamientoActual.nombre} | ${citaTratamientoActual.fecha} a las ${citaTratamientoActual.hora}`;
            
            document.getElementById('txtSintomas').value = citaTratamientoActual.notasSintomas || "";
            document.getElementById('txtPlan').value = citaTratamientoActual.notasPlan || "";
            document.getElementById('txtNotas').value = citaTratamientoActual.notasGenerales || "";
            
            marcasCorporales = citaTratamientoActual.marcasCuerpo || [];
            
            document.getElementById('modalTratamiento').style.display = "block";
            renderizarMarcasCorporales(); 
        };

        window.cerrarModalTratamiento = () => {
            document.getElementById('modalTratamiento').style.display = "none";
            citaTratamientoActual = null;
        };

        window.agregarMarca = (e) => {
            const contenedor = document.getElementById('contenedorMapaCuerpo');
            const rect = contenedor.getBoundingClientRect();
            
            const posX = ((e.clientX - rect.left) / rect.width) * 100;
            const posY = ((e.clientY - rect.top) / rect.height) * 100;

            marcasCorporales.push({ x: posX, y: posY });
            renderizarMarcasCorporales();
        };

        window.limpiarMarcas = () => {
            marcasCorporales = [];
            renderizarMarcasCorporales();
        };

        function renderizarMarcasCorporales() {
            const capa = document.getElementById('capaMarcas');
            capa.innerHTML = '';
            
            marcasCorporales.forEach(marca => {
                const punto = document.createElement('div');
                punto.className = 'marca-punto';
                punto.style.left = `${marca.x}%`;
                punto.style.top = `${marca.y}%`;
                capa.appendChild(punto);
            });
        }

        window.guardarTratamiento = async () => {
            const sintomas = document.getElementById('txtSintomas').value;
            const plan = document.getElementById('txtPlan').value;
            const notas = document.getElementById('txtNotas').value;

            try {
                await updateDoc(doc(db, 'bookings', citaTratamientoActual.id), { 
                    marcasCuerpo: marcasCorporales,
                    notasSintomas: sintomas,
                    notasPlan: plan,
                    notasGenerales: notas,
                    fichaCompletada: true
                });
                alert("✅ Ficha clínica guardada correctamente.");
                cerrarModalTratamiento();
                updateDayDetail(); 
            } catch(e) { 
                console.error(e);
                alert("Error al guardar la ficha."); 
            }
        };

        // Lógica de visualización para el modal de Reagendar/Cancelar
        window.toggleReagendarCampos = () => {
            const motivo = document.getElementById('motivoCambio').value;
            const campos = document.getElementById('camposReagendar');
            const btnConfirmar = document.getElementById('btnConfirmarModal');
            
            if (motivo === 'cancelacion') {
                campos.classList.add('hidden');
                btnConfirmar.innerText = "Confirmar Cancelación";
                btnConfirmar.classList.remove('bg-emerald-700');
                btnConfirmar.classList.add('bg-red-700');
            } else {
                campos.classList.remove('hidden');
                btnConfirmar.innerText = "Confirmar y Enviar Solución";
                btnConfirmar.classList.remove('bg-red-700');
                btnConfirmar.classList.add('bg-emerald-700');
            }
        };

        window.abrirModalReagendar = (id) => {
            citaAEditar = todasLasCitas.find(c => c.id === id);
            document.getElementById('infoReagendar').innerText = `CITA DE: ${citaAEditar.nombre} (${citaAEditar.hora})`;
            document.getElementById('newDateInput').value = citaAEditar.fecha;
            
            // Reiniciar campos por defecto
            document.getElementById('motivoCambio').value = "cliente";
            toggleReagendarCampos(); 
            
            document.getElementById('modalReagendar').style.display = "block";
            loadFreeSlotsForReschedule();
        };

        window.loadFreeSlotsForReschedule = () => {
            const newDate = document.getElementById('newDateInput').value;
            const select = document.getElementById('newTimeSelect');
            if(!newDate) return;
            const ocupados = todasLasCitas.filter(c => c.fecha === newDate && c.id !== citaAEditar.id).map(c => c.hora);
            const bloqueados = bloqueosManuales.filter(b => b.fecha === newDate).map(b => b.hora);
            select.innerHTML = `<option value="">-- Elige Nueva Hora --</option>`;
            slots.forEach(time => {
                if(!ocupados.includes(time) && !bloqueados.includes(time)) {
                    select.innerHTML += `<option value="${time}">${time}</option>`;
                }
            });
        };

        window.confirmarReagendar = async () => {
            const motivo = document.getElementById('motivoCambio').value;
            let mensaje = "";

            // LÓGICA DE CANCELACIÓN
            if (motivo === 'cancelacion') {
                try {
                    await deleteDoc(doc(db, 'bookings', citaAEditar.id));
                    mensaje = `🌿 *TICA NATURE SPA* 🌿\n\nHola *${citaAEditar.nombre}*, te confirmamos que tu cita programada para el *${citaAEditar.fecha}* a las *${citaAEditar.hora}* ha sido cancelada exitosamente según tu solicitud.\n\nHa sido un placer atenderte, avísanos cuando desees reagendar tu espacio. ¡Pura Vida! 🇨🇷`;
                    
                    const urlWA = `https://wa.me/${citaAEditar.telefono.replace(/\D/g,'')}?text=${encodeURIComponent(mensaje)}`;
                    cerrarModalReagendar();
                    alert("Cita cancelada correctamente. Abriendo WhatsApp...");
                    window.location.href = urlWA;
                } catch(e) { alert("Error al cancelar la cita"); }
                return; // Corta la ejecución aquí para no reagendar
            }

            // LÓGICA DE REAGENDAR NORMAL
            const nuevaFecha = document.getElementById('newDateInput').value;
            const nuevaHora = document.getElementById('newTimeSelect').value;
            if(!nuevaFecha || !nuevaHora) { alert("Elige fecha y hora para reagendar"); return; }
            
            try {
                await updateDoc(doc(db, 'bookings', citaAEditar.id), { fecha: nuevaFecha, hora: nuevaHora });
                if(motivo === "cliente") {
                    mensaje = `🌿 *TICA NATURE SPA* 🌿\n\nHola *${citaAEditar.nombre}*, según lo solicitado, hemos realizado el cambio en tu cita.\n\n📅 *NUEVA FECHA:* ${nuevaFecha}\n⏰ *NUEVA HORA:* ${nuevaHora}\n\n¡Te esperamos! ✨`;
                } else if(motivo === "admin") {
                    mensaje = `🌿 *TICA NATURE SPA* 🌿\n\nHola *${citaAEditar.nombre}*, te saluda Kimberly Salazar. Por motivos de *tráfico y logística* en los traslados hoy, he tenido que reajustar mi agenda.\n\nPara poder brindarte el mejor servicio, he movido tu espacio para:\n📅 *FECHA:* ${nuevaFecha}\n⏰ *HORA:* ${nuevaHora}\n\nPor favor, confírmame si este nuevo horario te queda bien. ¡Muchas gracias por tu comprensión! 🚗💨`;
                } else if(motivo === "emergencia") {
                    mensaje = `🌿 *TICA NATURE SPA* 🌿\n\nHola *${citaAEditar.nombre}*, te saluda Kimberly Salazar. Te contacto porque por un *motivo de fuerza mayor* fuera de mi control, no podré asistir a nuestra cita en el horario previsto.\n\nPara no dejarte sin tu terapia, he reservado para ti este nuevo espacio:\n📅 *FECHA:* ${nuevaFecha}\n⏰ *HORA:* ${nuevaHora}\n\nQuedo atenta a tu confirmación. ¡Mil disculpas y Pura Vida! 🇨🇷`;
                }
                const urlWA = `https://wa.me/${citaAEditar.telefono.replace(/\D/g,'')}?text=${encodeURIComponent(mensaje)}`;
                cerrarModalReagendar();
                alert("Agenda actualizada. Abriendo WhatsApp...");
                window.location.href = urlWA;
            } catch(e) { alert("Error al mover cita"); }
        };

        window.cerrarModalReagendar = () => document.getElementById('modalReagendar').style.display = "none";

        window.toggleBloqueo = async (hora, status) => {
            if(status === "booked") return;
            const idDoc = `${selectedDate}_${hora.replace(' ', '_')}`;
            if(status === "blocked-manual") await deleteDoc(doc(db, 'blocks', idDoc));
            else await setDoc(doc(db, 'blocks', idDoc), { fecha: selectedDate, hora: hora, tipo: 'bloqueo-manual' });
        };

        window.bloquearDiaCompleto = async () => {
            const batch = writeBatch(db);
            slots.forEach(time => {
                const idDoc = `${selectedDate}_${time.replace(' ', '_')}`;
                batch.set(doc(db, 'blocks', idDoc), { fecha: selectedDate, hora: time, tipo: 'bloqueo-manual' });
            });
            await batch.commit();
        };

        window.liberarDiaCompleto = async () => {
            const batch = writeBatch(db);
            bloqueosManuales.filter(b => b.fecha === selectedDate).forEach(b => {
                const idDoc = `${selectedDate}_${b.hora.replace(' ', '_')}`;
                batch.delete(doc(db, 'blocks', idDoc));
            });
            await batch.commit();
        };

        window.verHistorial = async (telefono) => {
            const telLimpio = telefono.replace(/\D/g, '');
            const snap = await getDoc(doc(db, 'clients', telLimpio));
            const modal = document.getElementById('modalHistorial');
            const cont = document.getElementById('contenidoHistorial');
            modal.style.display = "block";
            cont.innerHTML = "<p class='text-center py-4 font-bold text-emerald-800'><i class='fas fa-spinner fa-spin text-2xl mb-2'></i><br>Cargando historial completo...</p>";

            if(snap.exists()) {
                const d = snap.data();
                
                let edadMostrar = d.edad || 'N/A';
                if (d.fechaNacimiento) { 
                    const hoy = new Date();
                    const fechaNac = new Date(d.fechaNacimiento);
                    let edadCalculada = hoy.getFullYear() - fechaNac.getFullYear();
                    const mes = hoy.getMonth() - fechaNac.getMonth();
                    if (mes < 0 || (mes === 0 && hoy.getDate() < fechaNac.getDate())) { edadCalculada--; }
                    edadMostrar = `${edadCalculada} años`;
                }

                const q = query(collection(db, "bookings"), where("telefono", "==", telefono));
                const querySnapshot = await getDocs(q);
                let listaSesiones = [];
                querySnapshot.forEach((doc) => { listaSesiones.push({id: doc.id, ...doc.data()}); });
                listaSesiones.sort((a,b) => b.fecha.localeCompare(a.fecha));

                let sesionesHTML = listaSesiones.map(s => {
                    let extrasFicha = '';
                    if(s.fichaCompletada) {
                        const puntos = s.marcasCuerpo ? s.marcasCuerpo.length : 0;
                        extrasFicha = `
                        <div class="mt-3 bg-emerald-50 p-3 rounded-xl border border-emerald-100">
                            <p class="text-[9px] font-black text-emerald-800 uppercase mb-1"><i class="fas fa-notes-medical"></i> Reporte Clínico Guardado</p>
                            ${s.notasSintomas ? `<p class="text-[10px] text-stone-600 mb-1"><strong>Síntomas:</strong> ${s.notasSintomas}</p>` : ''}
                            ${s.notasPlan ? `<p class="text-[10px] text-stone-600 mb-1"><strong>Plan:</strong> ${s.notasPlan}</p>` : ''}
                            <p class="text-[10px] text-emerald-600 font-bold mt-2">📌 ${puntos} Puntos marcados en diagrama corporal.</p>
                            <button onclick="abrirFichaTratamiento('${s.id}')" class="mt-2 text-[9px] bg-white border border-emerald-200 px-3 py-1.5 rounded-lg text-emerald-700 font-bold hover:bg-emerald-100">Ver Ficha Completa</button>
                        </div>`;
                    }

                    return `
                    <div class="session-item shadow-sm border border-stone-100">
                        <div class="flex justify-between items-center">
                            <p class="text-[10px] font-black text-[#1a3a24] uppercase tracking-widest"><i class="far fa-calendar-check"></i> ${s.fecha} - ${s.hora}</p>
                            <span class="bg-stone-200 text-stone-600 text-[8px] px-2 py-1 rounded-full uppercase font-bold">${s.tipo || 'Terapia'}</span>
                        </div>
                        ${extrasFicha}
                    </div>`;
                }).join('');

                if(listaSesiones.length === 0) sesionesHTML = "<p class='text-xs italic text-stone-400 bg-stone-50 p-4 rounded-xl text-center'>No hay sesiones registradas aún.</p>";

                cont.innerHTML = `
                    <h3 class="text-3xl font-black text-[#1a3a24] mb-1">${d.nombre}</h3>
                    <p class="text-xs font-bold uppercase text-stone-400 tracking-widest mb-6 pb-4 border-b">Perfil de Cliente</p>
                    
                    <div class="space-y-4 text-xs font-bold uppercase text-stone-600">
                        <div class="grid grid-cols-2 gap-4">
                            <p class="bg-stone-50 p-3 rounded-xl"><i class="fas fa-birthday-cake text-stone-400"></i> Edad: ${edadMostrar}</p>
                            <p class="bg-stone-50 p-3 rounded-xl"><i class="fas fa-map-marker-alt text-stone-400"></i> ${d.direccion || 'No indicada'}</p>
                        </div>
                        <div class="bg-red-50 p-5 rounded-2xl border border-red-100">
                            <p class="text-red-800 mb-3 tracking-widest text-[10px]"><i class="fas fa-heartbeat"></i> FICHA MÉDICA INICIAL:</p>
                            <p class="mb-2"><strong class="text-red-900">Condiciones:</strong> <span class="text-stone-700 normal-case">${d.condicionesMedicas || 'Ninguna'}</span></p>
                            <p class="mb-2"><strong class="text-red-900">Accidentes:</strong> <span class="text-stone-700 normal-case">${d.accidentes || 'Ninguno'}</span></p>
                            <p><strong class="text-red-900">Zonas de Dolor:</strong> <span class="text-stone-700 normal-case">${d.zonasDolor || 'N/A'}</span></p>
                        </div>
                        <div class="mt-8 pt-4">
                            <p class="text-[#1a3a24] mb-4 text-sm tracking-widest flex justify-between items-center">
                                <span>HISTORIAL DE CITAS</span> 
                                <span class="bg-emerald-100 text-emerald-800 px-3 py-1 rounded-full text-[10px]">${listaSesiones.length}</span>
                            </p>
                            <div class="max-h-80 overflow-y-auto pr-2 space-y-3">
                                ${sesionesHTML}
                            </div>
                        </div>
                    </div>`;
            } else {
                cont.innerHTML = "<p class='text-center py-4 font-bold text-red-500'>No se encontró el perfil de esta clienta en la base de datos.</p>";
            }
        };

        window.cerrarModal = () => document.getElementById('modalHistorial').style.display = "none";
    </script>
</body>
</html>
